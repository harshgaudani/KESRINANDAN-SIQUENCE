<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kesrinandan Siquence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 500px;
    }

    h1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #ffffff;
      margin-bottom: 32px;
    }

    .divider {
      width: 50px;
      height: 3px;
      background: #e6a817;
      margin: 0 auto 32px;
      border-radius: 2px;
    }

    .contact {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px 24px;
      font-size: 14px;
      color: #ccc;
    }

    .contact a {
      color: #e6a817;
      text-decoration: none;
      font-weight: 600;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>KESRINANDAN SIQUENCE</h1>
    <div class="divider"></div>
    <div class="contact">
      📧 <a href="mailto:developer@kesrinandansiquence.top">developer@kesrinandansiquence.top</a>
    </div>
    <div class="footer">© 2026 Kesrinandan Siquence. All rights reserved.</div>
  </div>
</body>
</html>
